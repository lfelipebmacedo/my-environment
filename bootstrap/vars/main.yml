---
# Versões — altere aqui para fixar ou usar "latest"
node_version: "lts"         # "lts" | "22" | "20.11.0"
nvm_version: "latest"       # "latest" | "v0.40.3"
nvm_fallback_version: "v0.40.3"

docker_version: "latest"    # "latest" | "5:27.3.1-1~ubuntu.24.04~noble"

kind_fallback_version: "v0.27.0"
k9s_fallback_version: "v0.32.7"
obsidian_fallback_version: "v1.8.10"

# --- Obsidian backup (rclone + Google Drive) ---
obsidian_vault_path: "~/Obsidian/Notebook"
obsidian_backup_remote: "gdrive:obsidian-backup"
obsidian_backup_cron_hour: "2"
obsidian_backup_cron_minute: "0"
obsidian_backup_exclude:
  - ".obsidian/workspace.json"
  - ".obsidian/workspace-mobile.json"

# Flags de comportamento
remove_firefox_snap: false
