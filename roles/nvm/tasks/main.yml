---
- name: Verificar se NVM já está instalado
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.nvm/nvm.sh"
  register: nvm_stat

- name: Buscar última versão do NVM no GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/nvm-sh/nvm/releases/latest
    headers:
      Accept: application/vnd.github.v3+json
    return_content: true
  register: nvm_latest
  failed_when: false
  when: not nvm_stat.stat.exists and nvm_version == "latest"

- name: Definir tag do NVM (latest)
  ansible.builtin.set_fact:
    nvm_tag: "{{ nvm_latest.json.tag_name | default(nvm_fallback_version) }}"
  when: not nvm_stat.stat.exists and nvm_version == "latest"

- name: Definir tag do NVM (fixado)
  ansible.builtin.set_fact:
    nvm_tag: "{{ nvm_version }}"
  when: not nvm_stat.stat.exists and nvm_version != "latest"

- name: Instalar NVM
  ansible.builtin.shell: |
    curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/{{ nvm_tag }}/install.sh | bash
  args:
    creates: "{{ ansible_env.HOME }}/.nvm/nvm.sh"
    executable: /bin/bash
  when: not nvm_stat.stat.exists

- name: Instalar Node via NVM
  ansible.builtin.shell: |
    export NVM_DIR="{{ ansible_env.HOME }}/.nvm"
    [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
    {% if node_version == "lts" %}
    nvm install --lts
    nvm alias default 'lts/*'
    {% else %}
    nvm install {{ node_version }}
    nvm alias default {{ node_version }}
    {% endif %}
    corepack enable || true
  args:
    executable: /bin/bash
  register: nvm_node_install
  changed_when: "'already installed' not in nvm_node_install.stdout"
